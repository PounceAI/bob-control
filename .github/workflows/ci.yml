name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a quick succession of pushes doesn't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # Bob Control targets native Windows (the worker drives Bob over Windows named pipes), so CI
    # runs on the platform the code actually ships on.
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"] # 22.5+ is the floor (node:sqlite / node:test); 24 = current
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build (tsc + plugin bundle)
        run: npm run build

      - name: Test (with coverage)
        run: npm run test:coverage

  # The extension is a separate npm package, so the job above never builds it. Package it
  # here so a tsc/vsce break surfaces on the PR, not first at release-tag time.
  build-extension:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension deps
        working-directory: extension
        run: npm ci

      - name: Build & package extension
        working-directory: extension
        # `npm run package` runs tsc (vscode:prepublish) then vsce package, so it catches
        # both a compile break and a packaging/manifest break in one step.
        run: npm run package
